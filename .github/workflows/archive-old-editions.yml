name: Archive Clearforge editions after 90 days

on:
  schedule:
    - cron: "35 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview eligible editions without changing files"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: clearforge-edition-archive
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Clearforge
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build 90-day archives
        env:
          ARCHIVE_AFTER_DAYS: "90"
          ARCHIVE_DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          PODCAST_BASE_URL: https://clearforge-daily-brief.netlify.app
        run: node scripts/archive-old-editions.mjs

      - name: Save archive changes
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- public/archive public/podcast; then
            echo "No archive changes to commit."
            exit 0
          fi
          git config user.name "clearforge-archive-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/archive public/podcast
          git commit -m "Archive Clearforge editions older than 90 days"
          git push
