name: Clearforge Daily Draft

on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * *"

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate draft
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        run: npm run draft

      - name: Build static site from approved posts
        run: npm run build:site

      - name: Commit generated drafts and site
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate Clearforge daily draft"
          file_pattern: "drafts/** public/**"
