name: Clearforge Daily Autopilot

on:
  workflow_dispatch:
    inputs:
      edition_mode:
        description: "Fresh research or alternate angle from today's source base"
        required: true
        default: "fresh"
        type: choice
        options:
          - fresh
          - alternate
      angle:
        description: "Alternate-angle lens"
        required: false
        default: "creator_workflow"
        type: choice
        options:
          - creator_workflow
          - risk_control
          - beginner_learning
          - business_systems
  schedule:
    - cron: "30 3 * * *"
    - cron: "30 4 * * *"
    - cron: "15 4 * * *"
    - cron: "15 5 * * *"
    - cron: "30 15 * * *"
    - cron: "30 16 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: clearforge-daily-autopilot
  cancel-in-progress: false

env:
  BLOG_BASE_URL: "https://clearforge-daily-brief.netlify.app"
  NETLIFY_SITE_ID: "8e72a4fc-5ad6-4377-8f4a-399d4c936060"

jobs:
  autopilot:
    runs-on: ubuntu-latest

    steps:
      - name: Decide whether this is a UK run window
        id: gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "retry=false" >> "$GITHUB_OUTPUT"
            echo "edition=${{ github.event.inputs.edition_mode }}" >> "$GITHUB_OUTPUT"
            echo "angle=${{ github.event.inputs.angle }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LOCAL_TIME="$(TZ=Europe/London date +%H:%M)"
          echo "Europe/London local time: ${LOCAL_TIME}"
          if [ "${LOCAL_TIME}" = "04:30" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "retry=false" >> "$GITHUB_OUTPUT"
            echo "edition=fresh" >> "$GITHUB_OUTPUT"
            echo "angle=creator_workflow" >> "$GITHUB_OUTPUT"
          elif [ "${LOCAL_TIME}" = "05:15" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "retry=true" >> "$GITHUB_OUTPUT"
            echo "edition=fresh" >> "$GITHUB_OUTPUT"
            echo "angle=creator_workflow" >> "$GITHUB_OUTPUT"
          elif [ "${LOCAL_TIME}" = "16:30" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "retry=false" >> "$GITHUB_OUTPUT"
            echo "edition=alternate" >> "$GITHUB_OUTPUT"
            echo "angle=creator_workflow" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "retry=false" >> "$GITHUB_OUTPUT"
            echo "edition=fresh" >> "$GITHUB_OUTPUT"
            echo "angle=creator_workflow" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set edition identity
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          BASE_DATE="$(TZ=Europe/London date +%F)"
          ANGLE="${{ steps.gate.outputs.angle }}"
          case "${ANGLE}" in
            creator_workflow) ANGLE_SLUG="creator" ;;
            risk_control) ANGLE_SLUG="risk" ;;
            beginner_learning) ANGLE_SLUG="beginner" ;;
            business_systems) ANGLE_SLUG="systems" ;;
            *) ANGLE_SLUG="$(printf '%s' "${ANGLE}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g')" ;;
          esac
          if [ -z "${ANGLE_SLUG}" ]; then
            ANGLE_SLUG="angle"
          fi

          echo "CLEARFORGE_BASE_DATE=${BASE_DATE}" >> "$GITHUB_ENV"
          echo "CLEARFORGE_ANGLE=${ANGLE}" >> "$GITHUB_ENV"
          echo "CLEARFORGE_ANGLE_SLUG=${ANGLE_SLUG}" >> "$GITHUB_ENV"
          if [ "${{ steps.gate.outputs.edition }}" = "alternate" ]; then
            echo "CLEARFORGE_DATE=${BASE_DATE}-${ANGLE_SLUG}" >> "$GITHUB_ENV"
            echo "Using alternate edition ID: ${BASE_DATE}-${ANGLE_SLUG} from source date ${BASE_DATE} using angle ${ANGLE}"
          else
            echo "CLEARFORGE_DATE=${BASE_DATE}" >> "$GITHUB_ENV"
            echo "Using fresh edition ID: ${BASE_DATE}"
          fi

      - name: Skip retry when today's bundle already exists
        if: steps.gate.outputs.run == 'true' && steps.gate.outputs.retry == 'true'
        id: retrycheck
        shell: bash
        run: |
          if [ -f "bridge/clearforge/${CLEARFORGE_DATE}/manifest.json" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Today's bundle already exists; retry not needed."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true'
        run: npm install

      - name: Generate fresh research edition
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true' && steps.gate.outputs.edition == 'fresh'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
        run: npm run daily

      - name: Generate alternate-angle edition from today's source base
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true' && steps.gate.outputs.edition == 'alternate'
        env:
          CLEARFORGE_DATE: ${{ env.CLEARFORGE_DATE }}
          CLEARFORGE_BASE_DATE: ${{ env.CLEARFORGE_BASE_DATE }}
          CLEARFORGE_ANGLE: ${{ env.CLEARFORGE_ANGLE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
        run: npm run angle:alternate

      - name: Generate long-form feature from research pack
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true'
        env:
          CLEARFORGE_DATE: ${{ env.CLEARFORGE_DATE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
        run: npm run feature

      - name: Generate daily biggest-story podcast script
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true'
        env:
          CLEARFORGE_DATE: ${{ env.CLEARFORGE_DATE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
        run: npm run podcast:daily

      - name: Validate and auto approve only when checks pass
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true'
        env:
          CLEARFORGE_DATE: ${{ env.CLEARFORGE_DATE }}
        run: npm run validate:auto

      - name: Generate story-specific AI visuals and narration
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true'
        env:
          CLEARFORGE_DATE: ${{ env.CLEARFORGE_DATE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'gpt-image-2' }}
          OPENAI_IMAGE_QUALITY: ${{ vars.OPENAI_IMAGE_QUALITY || 'low' }}
          OPENAI_TTS_MODEL: ${{ vars.OPENAI_TTS_MODEL || 'gpt-4o-mini-tts' }}
          OPENAI_TTS_VOICE: ${{ vars.OPENAI_TTS_VOICE || 'coral' }}
        run: npm run media:ai

      - name: Build approved static site
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true'
        run: npm run build:site

      - name: Deploy Clearforge production site to Netlify
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NETLIFY_AUTH_TOKEN:-}" ]; then
            echo "::error::Missing NETLIFY_AUTH_TOKEN repository secret."
            exit 1
          fi
          npx --yes netlify-cli@latest deploy \
            --prod \
            --dir=public \
            --site="${NETLIFY_SITE_ID}" \
            --auth="${NETLIFY_AUTH_TOKEN}" \
            --message="Clearforge autopilot ${CLEARFORGE_DATE}"

      - name: Export approved distribution bundle
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true'
        env:
          CLEARFORGE_DATE: ${{ env.CLEARFORGE_DATE }}
        run: npm run export:approved

      - name: Syndicate full feature to DEV
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true'
        env:
          CLEARFORGE_DATE: ${{ env.CLEARFORGE_DATE }}
          DEV_API_KEY: ${{ secrets.DEV_API_KEY }}
        run: npm run syndicate:dev

      - name: Commit daily article feature media bridge site and syndication state
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Run Clearforge daily autopilot"
          file_pattern: "drafts/** media/** bridge/** public/**"

      - name: Trigger full video render and live social distribution
        if: steps.gate.outputs.run == 'true' && steps.retrycheck.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Missing CROSS_REPO_GITHUB_TOKEN repository secret."
            exit 1
          fi
          PAYLOAD="{\"event_type\":\"clearforge_publish\",\"client_payload\":{\"date\":\"${CLEARFORGE_DATE}\"}}"
          gh api repos/sapiverpress-studio/SapiverPress_comic_public/dispatches --method POST --input - <<< "${PAYLOAD}"
          echo "Triggered full Clearforge video render and live social distribution for ${CLEARFORGE_DATE}."

      - name: Open final failure issue after retry
        if: failure() && steps.gate.outputs.retry == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TITLE="Clearforge autopilot failed ${CLEARFORGE_DATE}"
          BODY="The automatic retry also failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING="$(gh issue list --state open --search "${TITLE} in:title" --json number --jq '.[0].number // empty')"
          if [ -z "${EXISTING}" ]; then
            gh issue create --title "${TITLE}" --body "${BODY}"
          else
            echo "Failure issue already exists: #${EXISTING}"
          fi
