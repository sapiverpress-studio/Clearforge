name: Rebuild Clearforge Organic Growth Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/build-site.mjs"
      - "src/build-publishing-dashboard.mjs"
      - "src/publishing-dashboard-client.mjs"
      - "netlify/functions/publishing-*.mts"
      - "package.json"
      - ".github/workflows/rebuild-organic-growth.yml"

permissions:
  contents: write

concurrency:
  group: clearforge-organic-growth-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Build approved static site
        env:
          BLOG_BASE_URL: https://clearforge-daily-brief.netlify.app
        run: npm run build:site

      - name: Commit organic discovery pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Rebuild Clearforge organic discovery pages"
          file_pattern: "public/**"
