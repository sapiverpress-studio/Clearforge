name: Recover Clearforge daily podcast MP4

on:
  workflow_dispatch:
    inputs:
      edition_date:
        description: "Daily edition date to recover (YYYY-MM-DD or dated edition slug)"
        required: true
        type: string
  push:
    paths:
      - "recovery/podcast-mp4/*.txt"

permissions:
  contents: write

concurrency:
  group: clearforge-podcast-mp4-recovery
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Clearforge
        uses: actions/checkout@v4

      - name: Select edition
        id: edition
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            edition="${{ github.event.inputs.edition_date }}"
          else
            marker="$(find recovery/podcast-mp4 -maxdepth 1 -type f -name '*.txt' | sort | tail -n 1)"
            [[ -n "$marker" ]] || { echo "No recovery marker found."; exit 1; }
            edition="$(basename "$marker" .txt)"
          fi
          [[ "$edition" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}([a-z0-9-]*)$ ]] || { echo "Invalid edition: $edition"; exit 1; }
          echo "edition=$edition" >> "$GITHUB_OUTPUT"

      - name: Install FFmpeg
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate MP4 from existing Irene MP3
        shell: bash
        run: |
          set -euo pipefail
          edition="${{ steps.edition.outputs.edition }}"
          folder="drafts/$edition/podcast"
          audio="$folder/clearforge-daily-podcast-$edition.mp3"
          video="$folder/clearforge-daily-podcast-$edition.mp4"
          [[ -s "$audio" ]] || { echo "Existing Irene MP3 is missing: $audio"; exit 1; }
          bash scripts/generate-podcast-mp4.sh "$audio" "$video" "media/$edition/story-1.png"

      - name: Add MP4 to podcast episode and downloads
        env:
          PODCAST_KIND: daily
          EPISODE_SLUG: ${{ steps.edition.outputs.edition }}
          SOURCE_MP3: drafts/${{ steps.edition.outputs.edition }}/podcast/clearforge-daily-podcast-${{ steps.edition.outputs.edition }}.mp3
          SOURCE_MP4: drafts/${{ steps.edition.outputs.edition }}/podcast/clearforge-daily-podcast-${{ steps.edition.outputs.edition }}.mp4
          METADATA_PATH: drafts/${{ steps.edition.outputs.edition }}/podcast/episode-metadata.json
          PODCAST_BASE_URL: https://clearforge-daily-brief.netlify.app
        run: node scripts/publish-podcast-feed.mjs

      - name: Save recovered MP4
        shell: bash
        run: |
          set -euo pipefail
          edition="${{ steps.edition.outputs.edition }}"
          git config user.name "clearforge-audio-bot"
          git config user.email "actions@users.noreply.github.com"
          git add "drafts/$edition/podcast/clearforge-daily-podcast-$edition.mp4" public/podcast
          git commit -m "Recover Clearforge daily podcast MP4 for $edition"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Deploy recovered podcast download
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: "8e72a4fc-5ad6-4377-8f4a-399d4c936060"
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${NETLIFY_AUTH_TOKEN:-}" ]] || { echo "Missing NETLIFY_AUTH_TOKEN."; exit 1; }
          npx --yes netlify-cli@latest deploy --prod --dir=public --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN" --message="Recover Clearforge podcast MP4 ${{ steps.edition.outputs.edition }}"
