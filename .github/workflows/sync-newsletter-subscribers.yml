name: Sync newsletter subscribers to Brevo

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

concurrency:
  group: clearforge-newsletter-subscriber-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Clearforge
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Sync consented Netlify submissions to Brevo
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 8e72a4fc-5ad6-4377-8f4a-399d4c936060
          NETLIFY_FORM_NAME: clearforge-weekly-digest
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
        run: node scripts/sync-netlify-subscribers-to-brevo.mjs
